<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LumiHer Echo</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>🌙 LumiHer Echo</h1>
    <p class="subtitle">a space to share thoughts & support each other</p>

    <!-- Post Box -->
    <div class="post-box">
      <textarea id="postInput" placeholder="Write something..."></textarea>
      <button onclick="addPost()">Post</button>
    </div>

    <!-- Posts -->
    <div id="posts"></div>

  </div>

  <!-- 🌐 Supabase CDN (MUST be before app.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- ⚙️ Your logic -->
  <script src="app.js"></script>

</body>

</html>
